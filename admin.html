<!DOCTYPE html>
<html lang="en" class="overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TNA Store Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .toast-enter { animation: toastIn 0.3s forwards; }
        .toast-exit { animation: toastOut 0.3s forwards; }
        @keyframes toastIn { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes toastOut { from { transform: translateY(0); opacity: 1; } to { transform: translateY(100%); opacity: 0; } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-gray-900">

    <div id="toast-container" class="fixed bottom-4 left-1/2 -translate-x-1/2 z-[200] flex flex-col gap-2 w-[90%] max-w-sm pointer-events-none"></div>

    <div class="px-6 py-4 bg-orange-600 text-white flex justify-between items-center shadow-md z-10">
        <h2 class="text-lg font-bold flex items-center"><i class="fa-solid fa-cart-shopping mr-3 text-orange-200"></i> Store Admin <span class="ml-2 bg-black text-xs px-2 py-0.5 rounded-full">v3</span></h2>
        <a href="index.html" class="text-sm font-bold text-orange-100 hover:text-white flex items-center bg-orange-700/50 px-3 py-1.5 rounded-lg transition-colors">
            <i class="fa-solid fa-store mr-2"></i> View Store
        </a>
    </div>

    <!-- Admin Login -->
    <div id="admin-login-view" class="flex-1 flex flex-col items-center justify-center p-8 bg-gray-50 z-20 absolute inset-0 top-[60px] overflow-y-auto">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center border border-gray-100 relative overflow-hidden my-auto">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-orange-400 to-red-500"></div>
            <i class="fa-solid fa-user-shield text-6xl text-orange-500 mb-6"></i>
            <h3 class="text-2xl font-black mb-2 text-gray-800">Store Admin Login</h3>
            <p class="text-sm text-gray-500 mb-6">Please sign in with your authorized master account.</p>
            
            <!-- Email/Password Login Form -->
            <form id="email-login-form" class="space-y-4 mb-6">
                <div>
                    <input type="email" id="login-email" placeholder="Email Address" required class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-orange-500 transition-all text-left">
                </div>
                <div>
                    <input type="password" id="login-password" placeholder="Password" required class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-orange-500 transition-all text-left">
                </div>
                <button type="submit" id="email-login-btn" class="w-full bg-orange-600 text-white font-bold py-3 rounded-xl hover:bg-orange-700 shadow-md transition-colors flex justify-center items-center gap-2">
                    <i class="fa-solid fa-envelope"></i> Sign in with Email
                </button>
            </form>

            <div class="relative flex py-2 items-center">
                <div class="flex-grow border-t border-gray-300"></div>
                <span class="flex-shrink-0 mx-4 text-gray-400 text-sm font-medium">OR</span>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>

            <!-- Google Login Button -->
            <button id="admin-login-btn" class="w-full mt-4 bg-black text-white font-bold py-3 rounded-xl hover:bg-gray-800 shadow-md transition-colors flex justify-center items-center gap-3">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5">
                <span>Sign in with Google</span>
            </button>
            
            <div id="login-loading" class="mt-4 text-orange-600 font-bold text-sm hidden"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Verifying Identity...</div>
        </div>
    </div>

    <!-- Admin Dashboard (Unchanged from previous V2) -->
    <div id="admin-dashboard-view" class="hidden flex-1 flex flex-col bg-white overflow-hidden relative">
        <div class="flex border-b border-gray-200 bg-white overflow-x-auto hide-scrollbar shadow-sm z-10">
            <button id="tab-add" class="px-4 py-4 font-bold border-b-[3px] border-orange-600 text-orange-600 whitespace-nowrap transition-colors"><i class="fa-solid fa-cloud-arrow-up mr-2"></i>Add Product</button>
            <button id="tab-manage" class="px-4 py-4 font-bold border-b-[3px] border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap transition-colors"><i class="fa-solid fa-box mr-2"></i>Manage</button>
            <button id="tab-categories" class="px-4 py-4 font-bold border-b-[3px] border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap transition-colors"><i class="fa-solid fa-tags mr-2"></i>Categories</button>
            <button id="tab-links" class="px-4 py-4 font-bold border-b-[3px] border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap transition-colors"><i class="fa-solid fa-link mr-2"></i>Menu Links</button>
        </div>

        <div class="flex-1 overflow-hidden relative bg-gray-50/50">
            <!-- Add Product Content -->
            <div id="content-add" class="absolute inset-0 overflow-y-auto p-4 md:p-8">
                <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-black text-xl text-gray-800" id="form-heading">Add Trending Product</h3>
                        <button type="button" id="cancel-edit-btn" class="hidden text-sm bg-red-50 text-red-600 font-bold px-3 py-1.5 rounded-lg hover:bg-red-100 transition-colors" onclick="cancelEdit()">Cancel Edit</button>
                    </div>
                    
                    <form id="add-product-form" class="space-y-5">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1.5">Product Title</label>
                            <input type="text" id="p-title" required placeholder="e.g., Smart Watch Series 8" class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-orange-500 transition-all">
                        </div>
                        
                        <div class="flex flex-col sm:flex-row gap-5">
                            <div class="flex-1">
                                <label class="block text-sm font-bold text-gray-700 mb-1.5">Price (BDT / USD)</label>
                                <input type="number" id="p-price" step="0.01" required class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-orange-500 transition-all">
                            </div>
                            <div class="flex-1">
                                <label class="block text-sm font-bold text-gray-700 mb-1.5">Category</label>
                                <select id="p-category" required class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-orange-500 bg-white transition-all"></select>
                            </div>
                        </div>
                        
                        <div class="bg-orange-50/50 p-5 rounded-xl border border-orange-100">
                            <label class="block text-sm font-bold text-orange-900 mb-1.5"><i class="fa-solid fa-link text-orange-500 mr-1"></i> Buy Now / Affiliate Redirect URL</label>
                            <input type="url" id="p-checkout" placeholder="https://s.click.aliexpress.com/..." required class="w-full border border-orange-200 p-3 rounded-xl focus:outline-none focus:border-orange-500 text-sm bg-white transition-all">
                            <p class="text-xs text-orange-600 mt-2 font-medium">User ekhane click korle direct ei link e chole jabe.</p>
                        </div>

                        <div class="bg-gray-50 p-5 rounded-xl border border-gray-200">
                            <label class="block text-sm font-bold text-gray-700 mb-3"><i class="fa-regular fa-images text-gray-400 mr-1"></i> Product Images (URLs)</label>
                            <div id="image-inputs-container" class="space-y-3">
                                <input type="url" name="img-url" required placeholder="Main Image URL" class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-gray-500 transition-all text-sm">
                            </div>
                            <button type="button" id="add-more-img-btn" class="mt-3 text-orange-600 text-sm font-bold hover:text-orange-800 flex items-center"><i class="fa-solid fa-plus-circle mr-1"></i> Add Another Image</button>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1.5">Description (Features & Details)</label>
                            <textarea id="p-desc" required rows="4" class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-orange-500 transition-all resize-none"></textarea>
                        </div>
                        
                        <button type="submit" id="submit-product-btn" class="w-full bg-orange-600 text-white font-bold py-4 rounded-xl hover:bg-orange-700 shadow-lg transition-colors text-lg mt-2">Publish Product</button>
                    </form>
                </div>
            </div>

            <!-- Content Manage -->
            <div id="content-manage" class="hidden absolute inset-0 overflow-y-auto p-4 md:p-8">
                <div class="max-w-4xl mx-auto">
                    <h3 class="font-black text-xl text-gray-800 mb-4">Manage Products</h3>
                    <div id="admin-product-list" class="space-y-4"></div>
                </div>
            </div>

            <!-- CATEGORIES -->
            <div id="content-categories" class="hidden absolute inset-0 overflow-y-auto p-4 md:p-8">
                <div class="max-w-2xl mx-auto">
                    <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm mb-6">
                        <form id="add-category-form" class="flex flex-col sm:flex-row gap-3">
                            <input type="text" id="new-cat-name" placeholder="E.g. Electronics, Fashion..." required class="flex-1 border border-gray-300 p-3.5 rounded-xl focus:outline-none focus:border-orange-500">
                            <button type="submit" id="btn-save-cat" class="bg-orange-600 hover:bg-orange-700 text-white px-6 py-3.5 rounded-xl font-bold shadow-md">Add Category</button>
                        </form>
                    </div>
                    <div id="admin-category-list" class="space-y-3"></div>
                </div>
            </div>

            <!-- LINKS -->
            <div id="content-links" class="hidden absolute inset-0 overflow-y-auto p-4 md:p-8">
                <div class="max-w-2xl mx-auto">
                    <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm mb-6">
                        <form id="add-link-form" class="space-y-4">
                            <div class="flex flex-col sm:flex-row gap-3">
                                <div class="flex-1"><input type="text" id="link-title" placeholder="Title" required class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-orange-500"></div>
                                <div class="flex-1"><input type="text" id="link-url" placeholder="URL" required class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-orange-500"></div>
                            </div>
                            <button type="submit" id="btn-save-link" class="w-full bg-black hover:bg-gray-800 text-white py-3 rounded-xl font-bold">Add Link</button>
                        </form>
                    </div>
                    <div id="admin-links-list" class="space-y-3"></div>
                </div>
            </div>
            
        </div>
    </div>

    <!-- Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        // 🟢 Added signInWithEmailAndPassword and createUserWithEmailAndPassword
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC9toKHOdJa-rWN7nEeLveFy5g0bbYvhUY",
            authDomain: "tna-studio-fed33.firebaseapp.com",
            projectId: "tna-studio-fed33",
            storageBucket: "tna-studio-fed33.firebasestorage.app",
            messagingSenderId: "115441976952",
            appId: "1:115441976952:web:7a1780e7634affa9708f8d"
        };

        const app = initializeApp(firebaseConfig);
        const authRef = getAuth(app);
        const dbRef = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        const MASTER_ADMIN_EMAIL = "princemarsal75@gmail.com";

        let allProducts = [], allCategories = [], allLinks = [];
        let editingProductId = null;
        let unsubscribeProducts, unsubscribeCategories, unsubscribeLinks;

        window.showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl shadow-2xl text-white font-bold pointer-events-auto toast-enter flex items-center ${type === 'success' ? 'bg-orange-600' : 'bg-red-600'}`;
            toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-triangle-exclamation'} mr-3 text-lg"></i> <span class="text-sm">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.replace('toast-enter', 'toast-exit'); setTimeout(() => toast.remove(), 300); }, 3000);
        };

        const googleLoginBtn = document.getElementById('admin-login-btn');
        const emailLoginForm = document.getElementById('email-login-form');
        const emailLoginBtn = document.getElementById('email-login-btn');
        const loginLoading = document.getElementById('login-loading');

        function toggleLoading(isLoading) {
            if(isLoading) {
                googleLoginBtn.classList.add('hidden');
                emailLoginForm.classList.add('hidden');
                loginLoading.classList.remove('hidden');
            } else {
                googleLoginBtn.classList.remove('hidden');
                emailLoginForm.classList.remove('hidden');
                loginLoading.classList.add('hidden');
            }
        }

        // 🟢 Google Login Logic
        googleLoginBtn.onclick = async () => {
            toggleLoading(true);
            try { await signInWithPopup(authRef, googleProvider); } 
            catch (e) { toggleLoading(false); showToast('Google Login Failed', 'error'); }
        };

        // 🟢 Email/Password Login Logic
        emailLoginForm.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            
            toggleLoading(true);
            try {
                // Try to sign in
                await signInWithEmailAndPassword(authRef, email, password);
            } catch (error) {
                // If account doesn't exist, try to create it (Only if it's the master email)
                if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                    if (email.toLowerCase() === MASTER_ADMIN_EMAIL.toLowerCase()) {
                         try {
                             await createUserWithEmailAndPassword(authRef, email, password);
                             showToast('Admin Account Created!');
                         } catch(createError) {
                             toggleLoading(false);
                             showToast(createError.message, 'error');
                         }
                    } else {
                        toggleLoading(false);
                        showToast('Access Denied. Invalid Admin Email.', 'error');
                    }
                } else {
                    toggleLoading(false);
                    showToast(error.message, 'error');
                }
            }
        };

        onAuthStateChanged(authRef, (user) => {
            if (user) {
                if (user.email.toLowerCase() === MASTER_ADMIN_EMAIL.toLowerCase()) {
                    document.getElementById('admin-login-view').classList.add('hidden');
                    document.getElementById('admin-dashboard-view').classList.remove('hidden');
                    document.getElementById('admin-dashboard-view').classList.add('flex');
                    loadAdminData();
                    showToast('Welcome back, Admin!');
                } else {
                    signOut(authRef); 
                    toggleLoading(false);
                    showToast('Access Denied!', 'error');
                }
            } else {
                document.getElementById('admin-dashboard-view').classList.add('hidden');
                document.getElementById('admin-dashboard-view').classList.remove('flex');
                document.getElementById('admin-login-view').classList.remove('hidden');
                toggleLoading(false);
            }
        });

        function loadAdminData() {
            unsubscribeProducts = onSnapshot(collection(dbRef, 'tna_products'), (snapshot) => {
                allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                allProducts.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                renderAdminList();
            });
            unsubscribeCategories = onSnapshot(collection(dbRef, 'tna_categories'), (snapshot) => {
                allCategories = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                allCategories.sort((a, b) => a.name.localeCompare(b.name));
                renderCategoryDropdown(); renderCategoryList();
            });
            unsubscribeLinks = onSnapshot(collection(dbRef, 'tna_links'), (snapshot) => {
                allLinks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                allLinks.sort((a, b) => (a.createdAt?.toMillis() || 0) - (b.createdAt?.toMillis() || 0));
                renderLinksList();
            });
        }

        const switchAdminTab = (btn, contentId) => {
            ['tab-add', 'tab-manage', 'tab-categories', 'tab-links'].forEach(id => { document.getElementById(id).classList.replace('border-orange-600', 'border-transparent'); document.getElementById(id).classList.replace('text-orange-600', 'text-gray-500'); });
            ['content-add', 'content-manage', 'content-categories', 'content-links'].forEach(id => document.getElementById(id).classList.add('hidden'));
            btn.classList.replace('border-transparent', 'border-orange-600'); btn.classList.replace('text-gray-500', 'text-orange-600');
            document.getElementById(contentId).classList.remove('hidden');
        };

        document.getElementById('tab-add').onclick = (e) => switchAdminTab(e.currentTarget, 'content-add');
        document.getElementById('tab-manage').onclick = (e) => switchAdminTab(e.currentTarget, 'content-manage');
        document.getElementById('tab-categories').onclick = (e) => switchAdminTab(e.currentTarget, 'content-categories');
        document.getElementById('tab-links').onclick = (e) => switchAdminTab(e.currentTarget, 'content-links');

        // Render Functions
        function renderCategoryDropdown() { document.getElementById('p-category').innerHTML = allCategories.map(c => `<option value="${c.name}">${c.name}</option>`).join(''); }
        function renderCategoryList() { document.getElementById('admin-category-list').innerHTML = allCategories.map(c => `<div class="bg-white p-4 rounded-xl border border-gray-100 flex justify-between items-center"><span class="font-bold">${c.name}</span><button class="text-red-500" onclick="deleteDoc(doc(dbRef, 'tna_categories', '${c.id}'))"><i class="fa-solid fa-trash"></i></button></div>`).join(''); }
        function renderLinksList() { document.getElementById('admin-links-list').innerHTML = allLinks.map(l => `<div class="bg-white p-4 rounded-xl border flex justify-between items-center"><div><span class="font-bold">${l.title}</span><br><span class="text-xs text-orange-500">${l.url}</span></div><button class="text-red-500" onclick="deleteDoc(doc(dbRef, 'tna_links', '${l.id}'))"><i class="fa-solid fa-trash"></i></button></div>`).join(''); }

        document.getElementById('add-category-form').onsubmit = async (e) => { e.preventDefault(); await addDoc(collection(dbRef, 'tna_categories'), { name: document.getElementById('new-cat-name').value.trim(), createdAt: serverTimestamp() }); document.getElementById('new-cat-name').value=''; showToast('Category Added'); };
        document.getElementById('add-link-form').onsubmit = async (e) => { e.preventDefault(); await addDoc(collection(dbRef, 'tna_links'), { title: document.getElementById('link-title').value, url: document.getElementById('link-url').value, icon: 'fa-link', createdAt: serverTimestamp() }); e.target.reset(); showToast('Link Added'); };

        document.getElementById('add-more-img-btn').onclick = () => {
            const input = document.createElement('input'); input.type = 'url'; input.name = 'img-url'; input.placeholder = 'Additional Image URL';
            input.className = 'w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-gray-500 transition-all text-sm mt-3';
            document.getElementById('image-inputs-container').appendChild(input);
        };

        window.editProduct = (id) => {
            const p = allProducts.find(x => x.id === id); if(!p) return;
            editingProductId = p.id;
            document.getElementById('form-heading').innerText = "Edit Product"; document.getElementById('submit-product-btn').innerText = "Update Product"; document.getElementById('cancel-edit-btn').classList.remove('hidden');
            document.getElementById('p-title').value = p.title; document.getElementById('p-price').value = p.price; document.getElementById('p-category').value = p.category; document.getElementById('p-checkout').value = p.checkoutLink || ''; document.getElementById('p-desc').value = p.description;
            
            const container = document.getElementById('image-inputs-container'); container.innerHTML = ''; 
            p.imageUrls.forEach((url, i) => { const input = document.createElement('input'); input.type='url'; input.name='img-url'; input.value=url; input.className=`w-full border border-gray-300 p-3 rounded-xl focus:border-gray-500 text-sm ${i>0?'mt-3':''}`; container.appendChild(input); });
            document.getElementById('tab-add').click();
        };

        window.cancelEdit = () => {
            editingProductId = null; document.getElementById('form-heading').innerText = "Add Trending Product"; document.getElementById('submit-product-btn').innerText = "Publish Product"; document.getElementById('cancel-edit-btn').classList.add('hidden'); document.getElementById('add-product-form').reset();
            document.getElementById('image-inputs-container').innerHTML = '<input type="url" name="img-url" required placeholder="Main Image URL" class="w-full border p-3 rounded-xl text-sm">';
        };

        document.getElementById('add-product-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-product-btn'); btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            const data = { title: document.getElementById('p-title').value, price: parseFloat(document.getElementById('p-price').value), category: document.getElementById('p-category').value, checkoutLink: document.getElementById('p-checkout').value.trim(), imageUrls: Array.from(document.querySelectorAll('input[name="img-url"]')).map(i=>i.value).filter(v=>v), description: document.getElementById('p-desc').value };
            
            try {
                if (editingProductId) await updateDoc(doc(dbRef, 'tna_products', editingProductId), data);
                else { data.reviews = []; data.createdAt = serverTimestamp(); await addDoc(collection(dbRef, 'tna_products'), data); }
                window.cancelEdit(); document.getElementById('tab-manage').click(); showToast('Success!');
            } catch (e) { showToast('Error', 'error'); btn.innerText = "Publish"; }
        };

        function renderAdminList() {
            document.getElementById('admin-product-list').innerHTML = allProducts.map(p => `
                <div class="bg-white p-4 rounded-xl border border-gray-100 flex justify-between items-center shadow-sm">
                    <div class="flex items-center gap-4">
                        <img src="${p.imageUrls && p.imageUrls.length > 0 ? p.imageUrls[0] : ''}" class="w-12 h-12 object-cover rounded bg-gray-100">
                        <div><h4 class="font-bold text-sm line-clamp-1">${p.title}</h4><span class="text-xs text-orange-600 font-bold">$${p.price}</span></div>
                    </div>
                    <div class="flex gap-2">
                        <button class="text-orange-600 p-2" onclick="editProduct('${p.id}')"><i class="fa-solid fa-pen"></i></button>
                        <button class="text-red-500 p-2" onclick="if(confirm('Delete?')) deleteDoc(doc(dbRef, 'tna_products', '${p.id}'))"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>`).join('');
        }
    </script>
</body>
</html>
