<!DOCTYPE html>
<html lang="en" class="overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TNA Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .toast-enter { animation: toastIn 0.3s forwards; }
        .toast-exit { animation: toastOut 0.3s forwards; }
        @keyframes toastIn { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes toastOut { from { transform: translateY(0); opacity: 1; } to { transform: translateY(100%); opacity: 0; } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-gray-900">

    <div id="toast-container" class="fixed bottom-4 left-1/2 -translate-x-1/2 z-[200] flex flex-col gap-2 w-[90%] max-w-sm pointer-events-none"></div>

    <div class="px-6 py-4 bg-indigo-600 text-white flex justify-between items-center shadow-md z-10">
        <h2 class="text-lg font-bold flex items-center"><i class="fa-solid fa-gear mr-3 text-indigo-200"></i> TNA Admin Panel</h2>
        <a href="index.html" class="text-sm font-bold text-indigo-100 hover:text-white flex items-center bg-indigo-700/50 px-3 py-1.5 rounded-lg transition-colors">
            <i class="fa-solid fa-store mr-2"></i> View Store
        </a>
    </div>

    <div id="admin-login-view" class="flex-1 flex flex-col items-center justify-center p-8 bg-gray-50 z-20 absolute inset-0 top-[60px]">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center border border-gray-100 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-red-500 to-indigo-600"></div>
            <i class="fa-solid fa-user-shield text-6xl text-indigo-500 mb-6"></i>
            <h3 class="text-2xl font-black mb-2 text-gray-800">Admin Authorization</h3>
            <p class="text-sm text-gray-500 mb-8">Please sign in with your authorized master account.</p>
            
            <button id="admin-login-btn" class="w-full bg-black text-white font-bold py-4 rounded-xl hover:bg-gray-800 shadow-lg transition-colors flex justify-center items-center gap-3">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5">
                <span>Sign in as Admin</span>
            </button>
            <div id="login-loading" class="mt-4 text-indigo-600 font-bold text-sm hidden"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Verifying Identity...</div>
        </div>
    </div>

    <div id="admin-dashboard-view" class="hidden flex-1 flex flex-col bg-white overflow-hidden relative">
        <div class="flex border-b border-gray-200 bg-white overflow-x-auto hide-scrollbar shadow-sm z-10">
            <button id="tab-add" class="px-4 py-4 font-bold border-b-[3px] border-indigo-600 text-indigo-600 whitespace-nowrap transition-colors"><i class="fa-solid fa-cloud-arrow-up mr-2"></i>Upload</button>
            <button id="tab-manage" class="px-4 py-4 font-bold border-b-[3px] border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap transition-colors"><i class="fa-solid fa-box mr-2"></i>Products</button>
            <button id="tab-categories" class="px-4 py-4 font-bold border-b-[3px] border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap transition-colors"><i class="fa-solid fa-tags mr-2"></i>Categories</button>
            <button id="tab-links" class="px-4 py-4 font-bold border-b-[3px] border-transparent text-gray-500 hover:text-gray-700 whitespace-nowrap transition-colors"><i class="fa-solid fa-link mr-2"></i>Menu Links</button>
        </div>

        <div class="flex-1 overflow-hidden relative bg-gray-50/50">
            <div id="content-add" class="absolute inset-0 overflow-y-auto p-4 md:p-8">
                <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-black text-xl text-gray-800" id="form-heading">Publish New Product</h3>
                        <button type="button" id="cancel-edit-btn" class="hidden text-sm bg-red-50 text-red-600 font-bold px-3 py-1.5 rounded-lg hover:bg-red-100 transition-colors" onclick="cancelEdit()">Cancel Edit</button>
                    </div>
                    
                    <form id="add-product-form" class="space-y-5">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1.5">Product Title</label>
                            <input type="text" id="p-title" required class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-indigo-600 focus:ring-2 focus:ring-indigo-100 transition-all">
                        </div>
                        
                        <div class="flex flex-col sm:flex-row gap-5">
                            <div class="flex-1">
                                <label class="block text-sm font-bold text-gray-700 mb-1.5">Price ($) <span class="text-xs text-gray-400 font-normal">(Just for show)</span></label>
                                <input type="number" id="p-price" step="0.01" value="0.00" required class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-indigo-600 transition-all">
                            </div>
                            <div class="flex-1">
                                <label class="block text-sm font-bold text-gray-700 mb-1.5">Category</label>
                                <select id="p-category" required class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-indigo-600 bg-white transition-all"></select>
                            </div>
                        </div>
                        
                        <div class="bg-indigo-50/50 p-5 rounded-xl border border-indigo-100">
                            <label class="block text-sm font-bold text-indigo-900 mb-1.5"><i class="fa-solid fa-link text-indigo-500 mr-1"></i> Target Download Link (Drive/Mega/Mediafire)</label>
                            <input type="url" id="p-checkout" placeholder="https://drive.google.com/..." required class="w-full border border-indigo-200 p-3 rounded-xl focus:outline-none focus:border-indigo-600 focus:ring-2 focus:ring-indigo-100 text-sm bg-white transition-all">
                            <p class="text-xs text-indigo-500 mt-2 font-medium">Ei link tai ad page gulo par hoyar por user pabe.</p>
                        </div>

                        <div class="bg-gray-50 p-5 rounded-xl border border-gray-200">
                            <label class="block text-sm font-bold text-gray-700 mb-3"><i class="fa-regular fa-images text-gray-400 mr-1"></i> Image URLs (Direct Links)</label>
                            <div id="image-inputs-container" class="space-y-3">
                                <input type="url" name="img-url" required placeholder="Main Image URL (e.g. Imgur link)" class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-gray-500 transition-all text-sm">
                            </div>
                            <button type="button" id="add-more-img-btn" class="mt-3 text-indigo-600 text-sm font-bold hover:text-indigo-800 flex items-center"><i class="fa-solid fa-plus-circle mr-1"></i> Add Another Image</button>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1.5">Description</label>
                            <textarea id="p-desc" required rows="4" class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-indigo-600 transition-all resize-none"></textarea>
                        </div>
                        
                        <button type="submit" id="submit-product-btn" class="w-full bg-black text-white font-bold py-4 rounded-xl hover:bg-gray-800 shadow-lg transition-colors text-lg mt-2">Publish Content</button>
                    </form>
                </div>
            </div>

            <!-- Manage Products -->
            <div id="content-manage" class="hidden absolute inset-0 overflow-y-auto p-4 md:p-8">
                <div class="max-w-4xl mx-auto">
                    <h3 class="font-black text-xl text-gray-800 mb-4">Manage Content</h3>
                    <div id="admin-product-list" class="space-y-4"></div>
                </div>
            </div>

            <!-- Categories -->
            <div id="content-categories" class="hidden absolute inset-0 overflow-y-auto p-4 md:p-8">
                <div class="max-w-2xl mx-auto">
                    <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm mb-6">
                        <form id="add-category-form" class="flex flex-col sm:flex-row gap-3">
                            <input type="text" id="new-cat-name" placeholder="Category Name" required class="flex-1 border border-gray-300 p-3.5 rounded-xl focus:outline-none focus:border-indigo-600">
                            <button type="submit" id="btn-save-cat" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3.5 rounded-xl font-bold shadow-md">Add</button>
                        </form>
                    </div>
                    <div id="admin-category-list" class="space-y-3"></div>
                </div>
            </div>

            <!-- Links -->
            <div id="content-links" class="hidden absolute inset-0 overflow-y-auto p-4 md:p-8">
                <div class="max-w-2xl mx-auto">
                    <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm mb-6">
                        <form id="add-link-form" class="space-y-4">
                            <div class="flex flex-col sm:flex-row gap-3">
                                <div class="flex-1"><input type="text" id="link-title" placeholder="Title" required class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-indigo-600"></div>
                                <div class="flex-1"><input type="text" id="link-url" placeholder="URL" required class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-indigo-600"></div>
                            </div>
                            <button type="submit" id="btn-save-link" class="w-full bg-black hover:bg-gray-800 text-white py-3 rounded-xl font-bold">Add to Menu</button>
                        </form>
                    </div>
                    <div id="admin-links-list" class="space-y-3"></div>
                </div>
            </div>
            
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC9toKHOdJa-rWN7nEeLveFy5g0bbYvhUY",
            authDomain: "tna-studio-fed33.firebaseapp.com",
            projectId: "tna-studio-fed33",
            storageBucket: "tna-studio-fed33.firebasestorage.app",
            messagingSenderId: "115441976952",
            appId: "1:115441976952:web:7a1780e7634affa9708f8d"
        };

        const app = initializeApp(firebaseConfig);
        const authRef = getAuth(app);
        const dbRef = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        const MASTER_ADMIN_EMAIL = "princemarsal75@gmail.com";

        let allProducts = [];
        let allCategories = [];
        let allLinks = [];
        let editingProductId = null;
        let unsubscribeProducts, unsubscribeCategories, unsubscribeLinks;

        window.showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl shadow-2xl text-white font-bold pointer-events-auto toast-enter flex items-center ${type === 'success' ? 'bg-black' : 'bg-red-500'}`;
            toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-check-circle text-green-400' : 'fa-triangle-exclamation text-white'} mr-3 text-lg"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-exit');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        const loginBtn = document.getElementById('admin-login-btn');
        const loginLoading = document.getElementById('login-loading');

        loginBtn.onclick = async () => {
            try {
                loginBtn.classList.add('hidden');
                loginLoading.classList.remove('hidden');
                await signInWithPopup(authRef, googleProvider);
            } catch (error) {
                loginBtn.classList.remove('hidden');
                loginLoading.classList.add('hidden');
                showToast('Login Failed', 'error');
            }
        };

        onAuthStateChanged(authRef, (user) => {
            if (user) {
                if (user.email === MASTER_ADMIN_EMAIL) {
                    document.getElementById('admin-login-view').classList.add('hidden');
                    document.getElementById('admin-dashboard-view').classList.remove('hidden');
                    document.getElementById('admin-dashboard-view').classList.add('flex');
                    showToast('Welcome back, Admin!');
                    loadAdminData();
                } else {
                    signOut(authRef);
                    loginBtn.classList.remove('hidden');
                    loginLoading.classList.add('hidden');
                    showToast('Access Denied.', 'error');
                }
            } else {
                document.getElementById('admin-dashboard-view').classList.add('hidden');
                document.getElementById('admin-dashboard-view').classList.remove('flex');
                document.getElementById('admin-login-view').classList.remove('hidden');
                loginBtn.classList.remove('hidden');
                loginLoading.classList.add('hidden');
                if(unsubscribeProducts) unsubscribeProducts();
                if(unsubscribeCategories) unsubscribeCategories();
                if(unsubscribeLinks) unsubscribeLinks();
            }
        });

        function loadAdminData() {
            unsubscribeProducts = onSnapshot(collection(dbRef, 'tna_products'), (snapshot) => {
                allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                allProducts.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                renderAdminList();
            });
            unsubscribeCategories = onSnapshot(collection(dbRef, 'tna_categories'), (snapshot) => {
                allCategories = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                allCategories.sort((a, b) => a.name.localeCompare(b.name));
                renderCategoryDropdown();
                renderCategoryList();
            });
            unsubscribeLinks = onSnapshot(collection(dbRef, 'tna_links'), (snapshot) => {
                allLinks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                allLinks.sort((a, b) => (a.createdAt?.toMillis() || 0) - (b.createdAt?.toMillis() || 0));
                renderLinksList();
            });
        }

        const switchAdminTab = (activeTabBtn, activeContentId) => {
            ['tab-add', 'tab-manage', 'tab-categories', 'tab-links'].forEach(id => {
                document.getElementById(id).classList.replace('border-indigo-600', 'border-transparent');
                document.getElementById(id).classList.replace('text-indigo-600', 'text-gray-500');
            });
            ['content-add', 'content-manage', 'content-categories', 'content-links'].forEach(id => document.getElementById(id).classList.add('hidden'));
            activeTabBtn.classList.replace('border-transparent', 'border-indigo-600');
            activeTabBtn.classList.replace('text-gray-500', 'text-indigo-600');
            document.getElementById(activeContentId).classList.remove('hidden');
        };

        document.getElementById('tab-add').onclick = (e) => switchAdminTab(e.currentTarget, 'content-add');
        document.getElementById('tab-manage').onclick = (e) => switchAdminTab(e.currentTarget, 'content-manage');
        document.getElementById('tab-categories').onclick = (e) => switchAdminTab(e.currentTarget, 'content-categories');
        document.getElementById('tab-links').onclick = (e) => switchAdminTab(e.currentTarget, 'content-links');

        document.getElementById('add-link-form').onsubmit = async (e) => {
            e.preventDefault();
            const title = document.getElementById('link-title').value.trim();
            const url = document.getElementById('link-url').value.trim();
            try {
                await addDoc(collection(dbRef, 'tna_links'), { title, url, icon: 'fa-link', createdAt: serverTimestamp() });
                e.target.reset(); showToast('Link added');
            } catch(error) { showToast('Permission Denied', 'error'); }
        };

        function renderLinksList() {
            document.getElementById('admin-links-list').innerHTML = allLinks.map(l => `
                <div class="bg-white p-4 rounded-xl border border-gray-100 flex justify-between items-center shadow-sm">
                    <div><span class="font-bold">${l.title}</span><br><span class="text-xs text-indigo-500">${l.url}</span></div>
                    <button class="text-red-500" onclick="deleteLink('${l.id}')"><i class="fa-solid fa-trash"></i></button>
                </div>`).join('');
        }
        window.deleteLink = async (id) => { if (confirm('Remove this link?')) { await deleteDoc(doc(dbRef, 'tna_links', id)); } };

        function renderCategoryDropdown() {
            document.getElementById('p-category').innerHTML = allCategories.length === 0 ? `<option value="">Create a category</option>` : allCategories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
        }
        function renderCategoryList() {
            document.getElementById('admin-category-list').innerHTML = allCategories.map(c => `
                <div class="bg-white p-4 rounded-xl border border-gray-100 flex justify-between items-center shadow-sm">
                    <span class="font-bold">${c.name}</span><button class="text-red-500" onclick="deleteCategory('${c.id}')"><i class="fa-solid fa-trash"></i></button>
                </div>`).join('');
        }
        document.getElementById('add-category-form').onsubmit = async (e) => {
            e.preventDefault();
            const catName = document.getElementById('new-cat-name').value.trim();
            if(!catName || allCategories.some(c => c.name.toLowerCase() === catName.toLowerCase())) return;
            await addDoc(collection(dbRef, 'tna_categories'), { name: catName, createdAt: serverTimestamp() });
            document.getElementById('new-cat-name').value = ''; showToast('Category Added');
        };
        window.deleteCategory = async (id) => { if (confirm('Delete category?')) { await deleteDoc(doc(dbRef, 'tna_categories', id)); } };

        document.getElementById('add-more-img-btn').onclick = () => {
            const container = document.getElementById('image-inputs-container');
            const input = document.createElement('input');
            input.type = 'url'; input.name = 'img-url'; input.placeholder = 'Additional Image URL';
            input.className = 'w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-gray-500 transition-all text-sm mt-3';
            container.appendChild(input);
        };

        window.editProduct = (id) => {
            const p = allProducts.find(x => x.id === id);
            if(!p) return;
            editingProductId = p.id;
            document.getElementById('form-heading').innerText = "Edit Content";
            document.getElementById('submit-product-btn').innerText = "Update Content";
            document.getElementById('cancel-edit-btn').classList.remove('hidden');
            
            document.getElementById('p-title').value = p.title;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-category').value = p.category;
            document.getElementById('p-checkout').value = p.checkoutLink || '';
            document.getElementById('p-desc').value = p.description;
            
            const container = document.getElementById('image-inputs-container');
            container.innerHTML = ''; 
            p.imageUrls.forEach((url, index) => {
                const input = document.createElement('input');
                input.type = 'url'; input.name = 'img-url'; input.value = url;
                input.className = `w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:border-gray-500 transition-all text-sm ${index > 0 ? 'mt-3' : ''}`;
                container.appendChild(input);
            });
            document.getElementById('tab-add').click();
        };

        window.cancelEdit = () => resetAdminEditState();

        function resetAdminEditState() {
            editingProductId = null;
            document.getElementById('form-heading').innerText = "Publish New Product";
            document.getElementById('submit-product-btn').innerText = "Publish Content";
            document.getElementById('cancel-edit-btn').classList.add('hidden');
            document.getElementById('add-product-form').reset();
            document.getElementById('image-inputs-container').innerHTML = '<input type="url" name="img-url" required placeholder="Main Image URL" class="w-full border border-gray-300 p-3 rounded-xl text-sm">';
        }

        document.getElementById('add-product-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-product-btn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Processing...';
            
            const urls = Array.from(document.querySelectorAll('input[name="img-url"]')).map(i => i.value).filter(v => v);
            const productData = {
                title: document.getElementById('p-title').value,
                price: parseFloat(document.getElementById('p-price').value),
                category: document.getElementById('p-category').value,
                checkoutLink: document.getElementById('p-checkout').value.trim(),
                imageUrls: urls,
                description: document.getElementById('p-desc').value
            };

            try {
                if (editingProductId) {
                    await updateDoc(doc(dbRef, 'tna_products', editingProductId), productData);
                    showToast('Updated!');
                } else {
                    productData.reviews = [];
                    productData.createdAt = serverTimestamp();
                    await addDoc(collection(dbRef, 'tna_products'), productData);
                    showToast('Published!');
                }
                resetAdminEditState();
                document.getElementById('tab-manage').click();
            } catch (error) {
                showToast('Error', 'error');
                btn.innerText = "Publish Content";
            }
        };

        function renderAdminList() {
            document.getElementById('admin-product-list').innerHTML = allProducts.map(p => `
                <div class="bg-white p-4 rounded-2xl border border-gray-100 flex justify-between items-center shadow-sm">
                    <div class="flex items-center gap-4">
                        <img src="${p.imageUrls ? p.imageUrls[0] : ''}" class="w-12 h-12 object-cover rounded bg-gray-100">
                        <div>
                            <h4 class="font-bold text-sm line-clamp-1">${p.title}</h4>
                            <span class="text-xs text-indigo-500 font-bold"><i class="fa-solid fa-link"></i> Linked</span>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button class="text-indigo-600 p-2" onclick="editProduct('${p.id}')"><i class="fa-solid fa-pen"></i></button>
                        <button class="text-red-500 p-2" onclick="deleteProduct('${p.id}')"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>`).join('');
        }

        window.deleteProduct = async (id) => { if (confirm('Delete this?')) { await deleteDoc(doc(dbRef, 'tna_products', id)); } };
    </script>
</body>
</html>
