<!DOCTYPE html>
<html lang="en" class="overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TNA Store - Trending Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f5f7; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Modern E-commerce Card Hover */
        .product-card { transition: all 0.3s ease; background: #fff; border-radius: 12px; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
        
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #ea580c; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-900 overflow-x-hidden min-h-screen flex flex-col">

    <!-- Navbar - E-Commerce Vibe -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="flex items-center gap-3">
                    <button id="menu-btn" class="text-gray-500 hover:text-orange-600 p-1 md:hidden"><i class="fa-solid fa-bars text-xl"></i></button>
                    <div class="flex-shrink-0 flex items-center select-none cursor-pointer" onclick="showHomeView()">
                        <i class="fa-solid fa-cart-shopping text-2xl text-orange-600 mr-2"></i>
                        <span class="font-black text-2xl tracking-tight text-gray-900">TNA <span class="text-orange-600">STORE</span></span>
                    </div>
                </div>

                <!-- Search Bar -->
                <div class="hidden md:flex flex-1 max-w-2xl mx-8">
                    <div class="relative w-full flex">
                        <input type="text" id="search-input" class="w-full bg-gray-100 border border-transparent rounded-l-full py-2.5 pl-6 pr-4 focus:outline-none focus:bg-white focus:border-orange-500 transition-colors" placeholder="Search trending products...">
                        <button class="bg-orange-600 text-white px-6 rounded-r-full hover:bg-orange-700 transition-colors"><i class="fa-solid fa-search"></i></button>
                    </div>
                </div>

                <div class="flex items-center gap-4" id="auth-section">
                    <!-- Auth UI injected here -->
                </div>
            </div>
            
            <!-- Mobile Search -->
            <div class="md:hidden pb-3">
                <div class="relative w-full flex shadow-sm">
                    <input type="text" id="mobile-search-input" class="w-full bg-gray-100 border border-gray-200 rounded-l-lg py-2 pl-4 pr-2 focus:outline-none text-sm" placeholder="Search products...">
                    <button class="bg-orange-600 text-white px-4 rounded-r-lg"><i class="fa-solid fa-search"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Workspace -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col md:flex-row gap-6 flex-1 w-full relative">
        
        <!-- SIDEBAR (Categories) -->
        <aside class="hidden md:block w-64 flex-shrink-0">
            <div class="bg-white rounded-xl p-5 border border-gray-200 shadow-sm sticky top-24">
                <h3 class="font-bold text-gray-900 mb-4 border-b border-gray-100 pb-2 uppercase text-sm tracking-wider">Categories</h3>
                <ul class="space-y-1" id="category-list">
                    <!-- Categories injected here -->
                </ul>
            </div>
        </aside>

        <!-- MAIN VIEW (Grid) -->
        <div id="view-home" class="flex-1 min-w-0 transition-opacity duration-300">
            <!-- Mobile Category Scroll -->
            <div class="md:hidden mb-4 overflow-x-auto hide-scrollbar">
                <div class="flex space-x-2" id="mobile-category-list"></div>
            </div>

            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl md:text-2xl font-bold text-gray-800" id="current-category-title">All Products</h2>
                <span class="text-gray-500 text-sm font-medium" id="product-count">0 items found</span>
            </div>

            <!-- Loader -->
            <div id="loading-state" class="flex flex-col items-center justify-center py-20">
                <div class="loader mb-4"></div>
                <p class="text-gray-500 font-medium">Loading Store...</p>
            </div>

            <!-- Product Grid -->
            <div id="products-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-5 hidden"></div>
            
            <div id="empty-state" class="hidden text-center py-20 bg-white rounded-xl border border-gray-200 shadow-sm">
                <i class="fa-solid fa-box-open text-6xl text-gray-300 mb-4"></i>
                <h3 class="text-xl font-bold text-gray-700">No products found</h3>
            </div>
        </div>

        <!-- PRODUCT DETAILS VIEW -->
        <div id="view-details" class="hidden flex-1 flex-col bg-white rounded-2xl shadow-sm border border-gray-200 p-4 md:p-8">
            <button onclick="showHomeView()" class="self-start mb-6 text-gray-500 hover:text-orange-600 font-bold flex items-center transition-colors">
                <i class="fa-solid fa-arrow-left mr-2"></i> Back
            </button>
            
            <div class="flex flex-col md:flex-row gap-8 lg:gap-12">
                <!-- Gallery -->
                <div class="w-full md:w-1/2">
                    <div class="bg-gray-100 rounded-xl overflow-hidden aspect-square relative border border-gray-200">
                        <img id="detail-main-img" src="" class="w-full h-full object-contain mix-blend-multiply p-4">
                    </div>
                    <div id="detail-thumbnails" class="flex gap-2 mt-4 overflow-x-auto hide-scrollbar pb-2"></div>
                </div>

                <!-- Product Info -->
                <div class="w-full md:w-1/2 flex flex-col">
                    <div class="text-sm text-orange-600 font-bold tracking-wide uppercase mb-2" id="detail-category">Category</div>
                    <h1 id="detail-title" class="text-2xl md:text-3xl font-bold text-gray-900 leading-tight mb-4">Product Title</h1>
                    
                    <div class="flex items-center text-yellow-500 text-sm mb-6">
                        <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star-half-stroke"></i>
                        <span class="text-gray-400 ml-2 text-xs" id="detail-review-count">(0 Reviews)</span>
                    </div>

                    <div class="bg-orange-50 p-4 rounded-xl border border-orange-100 mb-6">
                        <span class="text-sm text-gray-500">Price</span>
                        <div class="text-4xl font-black text-orange-600" id="detail-price">$0.00</div>
                    </div>
                    
                    <div class="mb-8">
                        <h3 class="font-bold text-gray-900 mb-2 border-b pb-2">Product Description</h3>
                        <p id="detail-desc" class="text-gray-600 whitespace-pre-wrap leading-relaxed text-sm"></p>
                    </div>
                    
                    <div class="mt-auto">
                        <!-- THE REDIRECT BUTTON -->
                        <!-- Ekhane click korle direct affiliate link e jabe -->
                        <button id="detail-buy-btn" class="w-full bg-orange-600 text-white hover:bg-orange-700 font-black py-4 rounded-xl transition-all shadow-lg hover:shadow-orange-500/30 flex justify-center items-center text-lg transform hover:-translate-y-1">
                            Buy Now <i class="fa-solid fa-arrow-up-right-from-square ml-2"></i>
                        </button>
                        <p class="text-center text-xs text-gray-400 mt-3"><i class="fa-solid fa-shield-halved"></i> Secure checkout via official store</p>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Mobile Menu Overlay -->
    <div id="main-sidebar" class="fixed inset-y-0 left-0 w-[280px] bg-white shadow-2xl z-[60] transform -translate-x-full transition-transform duration-300 flex flex-col md:hidden">
        <div class="p-5 bg-gray-50 border-b flex justify-between items-center">
            <span class="font-black text-xl text-gray-900">Menu</span>
            <button id="close-menu-btn" class="text-gray-500 hover:text-black text-xl p-1"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-5">
            <!-- Sidebar links can be added here if needed -->
        </div>
    </div>
    <div id="overlay-main" class="fixed inset-0 bg-black/50 z-[50] hidden backdrop-blur-sm"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC9toKHOdJa-rWN7nEeLveFy5g0bbYvhUY",
            authDomain: "tna-studio-fed33.firebaseapp.com",
            projectId: "tna-studio-fed33",
            storageBucket: "tna-studio-fed33.firebasestorage.app",
            messagingSenderId: "115441976952",
            appId: "1:115441976952:web:7a1780e7634affa9708f8d"
        };

        const app = initializeApp(firebaseConfig);
        const authRef = getAuth(app);
        const dbRef = getFirestore(app);

        let allProducts = [], allCategories = [];
        let currentCategory = 'All';

        // Initialize Anonymous Auth to read DB
        signInAnonymously(authRef).then(() => {
            onSnapshot(collection(dbRef, 'tna_products'), (snapshot) => {
                allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                allProducts.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                document.getElementById('loading-state').classList.add('hidden');
                renderProducts();
            });

            onSnapshot(collection(dbRef, 'tna_categories'), (snapshot) => {
                allCategories = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                allCategories.sort((a, b) => a.name.localeCompare(b.name));
                renderCategoriesUI();
            });
        });

        // Basic Login Button UI for top corner
        document.getElementById('auth-section').innerHTML = `<button class="bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold px-4 py-2 rounded-full text-sm transition-colors"><i class="fa-solid fa-user mr-1"></i> Sign In</button>`;

        function renderCategoriesUI() {
            const listDesktop = document.getElementById('category-list');
            const listMobile = document.getElementById('mobile-category-list');
            
            let htmlDesktop = `<li><button class="cat-btn w-full text-left px-4 py-2.5 rounded-lg text-sm font-medium transition-colors ${currentCategory === 'All' ? 'bg-orange-50 text-orange-600 font-bold' : 'text-gray-600 hover:bg-gray-50'}" data-cat="All">All Products</button></li>`;
            let htmlMobile = `<button class="cat-btn whitespace-nowrap px-4 py-1.5 rounded-full text-sm font-medium border ${currentCategory === 'All' ? 'bg-orange-600 border-orange-600 text-white' : 'bg-white border-gray-300 text-gray-700'}" data-cat="All">All</button>`;
            
            allCategories.forEach(cat => {
                const isAct = currentCategory === cat.name;
                htmlDesktop += `<li><button class="cat-btn w-full text-left px-4 py-2.5 rounded-lg text-sm font-medium transition-colors ${isAct ? 'bg-orange-50 text-orange-600 font-bold' : 'text-gray-600 hover:bg-gray-50'}" data-cat="${cat.name}">${cat.name}</button></li>`;
                htmlMobile += `<button class="cat-btn whitespace-nowrap px-4 py-1.5 rounded-full text-sm font-medium border ${isAct ? 'bg-orange-600 border-orange-600 text-white' : 'bg-white border-gray-300 text-gray-700'}" data-cat="${cat.name}">${cat.name}</button>`;
            });
            
            listDesktop.innerHTML = htmlDesktop;
            listMobile.innerHTML = htmlMobile;

            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    currentCategory = e.currentTarget.getAttribute('data-cat');
                    renderCategoriesUI(); // Re-render to update active classes
                    renderProducts();
                });
            });
        }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            let filtered = allProducts.filter(p => currentCategory === 'All' || p.category === currentCategory);
            const term = (document.getElementById('search-input').value || document.getElementById('mobile-search-input').value).toLowerCase();
            if (term) filtered = filtered.filter(p => p.title.toLowerCase().includes(term));

            document.getElementById('product-count').innerText = `${filtered.length} items`;
            document.getElementById('current-category-title').innerText = currentCategory === 'All' ? 'All Products' : currentCategory;

            if (filtered.length === 0) { grid.classList.add('hidden'); document.getElementById('empty-state').classList.remove('hidden'); } 
            else {
                document.getElementById('empty-state').classList.add('hidden'); grid.classList.remove('hidden');
                filtered.forEach(product => {
                    const imgUrl = product.imageUrls && product.imageUrls.length > 0 ? product.imageUrls[0] : 'https://placehold.co/400x400?text=No+Image';
                    const card = document.createElement('div');
                    card.className = 'product-card border border-gray-200 overflow-hidden flex flex-col cursor-pointer bg-white';
                    card.onclick = () => openProductDetails(product.id);
                    card.innerHTML = `
                        <div class="aspect-square w-full bg-gray-50 relative p-4 flex items-center justify-center">
                            <img src="${imgUrl}" class="w-full h-full object-contain mix-blend-multiply hover:scale-105 transition-transform duration-500">
                        </div>
                        <div class="p-3 md:p-4 flex flex-col flex-grow">
                            <div class="text-[10px] md:text-xs text-gray-400 uppercase tracking-wide mb-1">${product.category}</div>
                            <h3 class="font-medium text-sm md:text-base text-gray-900 mb-2 line-clamp-2 leading-tight">${product.title}</h3>
                            <div class="mt-auto flex items-center justify-between">
                                <span class="text-lg md:text-xl font-black text-orange-600">$${product.price}</span>
                                <button class="w-8 h-8 rounded-full bg-orange-50 text-orange-600 flex items-center justify-center hover:bg-orange-600 hover:text-white transition-colors"><i class="fa-solid fa-plus text-sm"></i></button>
                            </div>
                        </div>`;
                    grid.appendChild(card);
                });
            }
        }

        window.showHomeView = () => { 
            document.getElementById('view-details').classList.add('hidden'); 
            document.getElementById('view-home').classList.remove('hidden'); 
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        };

        window.openProductDetails = (id) => {
            const p = allProducts.find(x => x.id === id);
            if (!p) return;
            
            const images = p.imageUrls && p.imageUrls.length > 0 ? p.imageUrls : ['https://placehold.co/600x600?text=No+Image'];
            
            document.getElementById('detail-title').innerText = p.title;
            document.getElementById('detail-category').innerText = p.category;
            document.getElementById('detail-price').innerText = `$${p.price}`;
            document.getElementById('detail-desc').innerText = p.description;
            document.getElementById('detail-main-img').src = images[0];
            
            const thumbContainer = document.getElementById('detail-thumbnails');
            thumbContainer.innerHTML = '';
            images.forEach(url => {
                const img = document.createElement('img'); img.src = url;
                img.className = "w-16 h-16 object-contain bg-gray-50 rounded cursor-pointer border-2 border-transparent hover:border-orange-500 opacity-70 hover:opacity-100 transition-all p-1";
                img.onclick = () => document.getElementById('detail-main-img').src = url;
                thumbContainer.appendChild(img);
            });

            // 🟢 REDIRECT MAGIC 🟢
            const buyBtn = document.getElementById('detail-buy-btn');
            if (p.checkoutLink) {
                buyBtn.onclick = () => {
                    // Direct affiliate link a open hobe notun tab e
                    window.open(p.checkoutLink, '_blank');
                };
            }

            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-details').classList.remove('hidden');
            document.getElementById('view-details').classList.add('flex');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        document.getElementById('search-input').addEventListener('input', renderProducts);
        document.getElementById('mobile-search-input').addEventListener('input', renderProducts);

        // Mobile Menu
        const toggleMenu = (show) => { 
            document.getElementById('main-sidebar').style.transform = show ? 'translateX(0)' : 'translateX(-100%)'; 
            document.getElementById('overlay-main').classList.toggle('hidden', !show); 
        };
        document.getElementById('menu-btn').onclick = () => toggleMenu(true); 
        document.getElementById('close-menu-btn').onclick = () => toggleMenu(false); 
        document.getElementById('overlay-main').onclick = () => toggleMenu(false);
    </script>
</body>
</html>
